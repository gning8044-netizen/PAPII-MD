<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Bot WhatsApp</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0;
        }
        .code {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🤖 DEV SHADOW BOT</h1>
        <p>Entre ton numéro pour obtenir le code pairing</p>
        
        <input type="tel" id="phone" placeholder="771234567" maxlength="9">
        <button onclick="generateCode()">🔐 GÉNÉRER LE CODE</button>
        
        <div id="result" style="display: none;">
            <div class="code" id="code">ABCD1234</div>
            <button onclick="copyCode()">📋 COPIER</button>
        </div>
    </div>

    <script>
        function generateCode() {
            let phone = document.getElementById('phone').value;
            
            if (!phone) {
                alert('Entre ton numéro !');
                return;
            }
            
            document.querySelector('button').textContent = "⏳ GÉNÉRATION...";
            
            setTimeout(() => {
                let code = Math.random().toString(36).substring(2, 10).toUpperCase();
                document.getElementById('code').textContent = code;
                document.getElementById('result').style.display = 'block';
                document.querySelector('button').textContent = "🔐 GÉNÉRER LE CODE";
            }, 2000);
        }
        
        function copyCode() {
            let code = document.getElementById('code').textContent;
            navigator.clipboard.writeText(code);
            alert('✅ Code copié !');
        }
    </script>
</body>
</html>
